apiVersion: v1
kind: ConfigMap
metadata:
  name: mathquiz-config
  namespace: mathquiz
data:
  DATABASE_URL:            "postgresql://postgres:postgres@postgres:5432/mathquiz"
  REDIS_URL:               "redis://redis:6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  FRONTEND_URL:            "http://localhost:30080"
  PORT:                    "3001"
  ORCHESTRATOR_MODEL:       "claude-sonnet-4-6"
  RESEARCHER_MODEL:         "claude-haiku-4-5-20251001"
  ANALYST_MODEL:            "claude-sonnet-4-6"
  CRITIC_MODEL:             "claude-sonnet-4-6"
  QUESTION_GENERATOR_MODEL: "claude-sonnet-4-6"
