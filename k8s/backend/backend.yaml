apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mathquiz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/sandeshlamsal/quiz-backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: mathquiz-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mathquiz-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/topics
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: mathquiz
spec:
  selector:
    app: backend
  ports:
    - port: 3001
