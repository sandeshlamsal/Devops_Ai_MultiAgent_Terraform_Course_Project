apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: mathquiz
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 512Mi
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--appendonly", "yes"]   # AOF persistence
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mathquiz
spec:
  selector:
    app: redis
  ports:
    - port: 6379
