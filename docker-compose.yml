services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    build:
      context: ./quiz-app/postgres
      dockerfile: Dockerfile
    image: ghcr.io/sandeshlamsal/quiz-postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mathquiz
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mathquiz"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9094:9094"   # External access from host machine
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 40s

  # ── Application ─────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./quiz-app/backend
      dockerfile: Dockerfile
    image: ghcr.io/sandeshlamsal/quiz-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL:             postgresql://postgres:postgres@postgres:5432/mathquiz
      REDIS_URL:                redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS:  kafka:9092
      FRONTEND_URL:             http://localhost:3000
      PORT:                     3001
      JWT_SECRET:               ${JWT_SECRET:-mathquiz-dev-secret-2024}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  frontend:
    build:
      context: ./quiz-app/frontend
      dockerfile: Dockerfile
    image: ghcr.io/sandeshlamsal/quiz-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── AI Agent Worker (Python — Kafka consumers) ──────────────────────────────

  agent-worker:
    build:
      context: .
      dockerfile: agents/Dockerfile
    image: ghcr.io/sandeshlamsal/quiz-agent-worker:latest
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANTHROPIC_API_KEY:       ${ANTHROPIC_API_KEY}
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
